# ── Identificación de la aplicación ─────────────────────────────
spring.application.name=producto-service
app.version=0.7.0
app.api.version=v1

# ── Servidor HTTP ────────────────────────────────────────────────
server.port=8080

# ── Base de datos (PostgreSQL) ───────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/curso_springboot
spring.datasource.username=devdb
spring.datasource.password=a1b2c3d4
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────
# show-sql: muestra en consola el SQL generado (útil para aprender/depurar)
spring.jpa.show-sql=true

# ddl-auto define qué hace Hibernate con el esquema al arrancar:
#   create-drop  → CREA las tablas al arrancar, las ELIMINA al apagar (desarrollo)
#   update       → Agrega columnas faltantes, no elimina nada (pre-producción)
#   validate     → Solo verifica que el esquema coincide — falla si no (producción)
#   none         → No hace nada (producción con Liquibase/Flyway)
spring.jpa.hibernate.ddl-auto=create-drop

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Pool de conexiones (HikariCP — incluido por defecto) ─────────
# HikariCP mantiene un pool de conexiones abiertas para reutilizarlas
# en vez de abrir y cerrar una conexión TCP por cada petición.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# ── Logging ──────────────────────────────────────────────────────
logging.level.root=ERROR
logging.level.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# Actuator corre en un puerto separado (buena práctica: no exponer al público)
management.server.port=8081

# include=* expone TODOS los endpoints (solo en desarrollo — en producción selecciona cuáles)
management.endpoints.web.exposure.include=*

